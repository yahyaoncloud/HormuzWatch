name: "Ansible Config Push"

on:
  # Button-click config push / backup / destroy
  workflow_dispatch:
    inputs:
      playbook:
        description: "Playbook to run"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy      # Push configs & start services
          - backup      # pg_dump → Blob Storage
          - destroy     # Stop services & remove configs
          - site        # Full site provisioning
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
      dry_run:
        description: "Dry run (--check mode)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read

jobs:
  ansible:
    name: "Ansible ${{ inputs.playbook }} — ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible azure-cli msrestazure

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AVM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "Host *" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Azure Login (for Key Vault access)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Ansible Playbook
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          KV_NAME:               "kv-hormuzwatch-${{ inputs.environment }}"
        run: |
          DRY_RUN_FLAG=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            DRY_RUN_FLAG="--check --diff"
          fi

          ansible-playbook \
            -i inventory/${{ inputs.environment }}.ini \
            playbooks/${{ inputs.playbook }}.yml \
            --extra-vars "env=${{ inputs.environment }} kv_name=${KV_NAME}" \
            $DRY_RUN_FLAG \
            -v

      - name: Summary
        run: |
          echo "### ✅ Ansible Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Playbook**: ${{ inputs.playbook }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run**: ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
