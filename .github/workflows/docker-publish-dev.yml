name: "Build and Push to Docker Hub (Dev)"

on:
  push:
    branches:
      - mvp
    paths:
      - "server/**"
      - "ml-service/**"
      - ".github/workflows/docker-publish-dev.yml"

jobs:
  build-and-push:
    name: "Build & Push Docker Images"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ─── Build & Push Go Backend ──────────────────────────────────────
      - name: Build and push Go Backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/hormuzwatch-server:dev
            ${{ secrets.DOCKER_USERNAME }}/hormuzwatch-server:${{ steps.vars.outputs.sha_short }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/hormuzwatch-server:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/hormuzwatch-server:buildcache,mode=max

      # ─── Build & Push ML Service ──────────────────────────────────────
      - name: Build and push ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          file: ./ml-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/hormuzwatch-ml:dev
            ${{ secrets.DOCKER_USERNAME }}/hormuzwatch-ml:${{ steps.vars.outputs.sha_short }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/hormuzwatch-ml:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/hormuzwatch-ml:buildcache,mode=max
