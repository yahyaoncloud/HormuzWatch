name: Deploy Backend & ML Service

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'ml-service/**'
      - '.github/workflows/deploy-backend.yml'

env:
  ACR_NAME: acr${{ secrets.PROJECT_NAME }}${{ secrets.ENV_NAME }}
  RESOURCE_GROUP: rg-${{ secrets.PROJECT_NAME }}-${{ secrets.ENV_NAME }}
  BACKEND_APP_NAME: ca-${{ secrets.PROJECT_NAME }}-${{ secrets.ENV_NAME }}-api
  ML_APP_NAME: ca-${{ secrets.PROJECT_NAME }}-${{ secrets.ENV_NAME }}-ml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # Build & Push ML Service
      - name: Build and push ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/ml-service:${{ github.sha }},${{ env.ACR_NAME }}.azurecr.io/ml-service:latest

      # Build & Push Go Backend
      - name: Build and push Go Backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }},${{ env.ACR_NAME }}.azurecr.io/backend:latest

      # Deploy ML Service to Container Apps
      - name: Deploy ML Service to ACA
        run: |
          az containerapp update \
            --name ${{ env.ML_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/ml-service:${{ github.sha }}

      # Deploy Go Backend to Container Apps
      - name: Deploy Go Backend to ACA
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}
