name: "Terraform Plan"

on:
  pull_request:
    branches:
      - azure-dep
      - mvp
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  TF_VERSION:          "1.8.5"

jobs:
  plan:
    name: "Terraform Plan — ${{ github.base_ref }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.base_ref }}" == "azure-dep" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "tfvars=environments/prod/terraform.tfvars" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "tfvars=environments/dev/terraform.tfvars" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=hormuzwatch/${{ steps.env.outputs.env }}/terraform.tfstate"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: tfsec Security Scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          github_token: ${{ secrets.GITHUB_TOKEN }}
          soft_fail: true

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        env:
          TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          terraform plan \
            -var-file="${{ steps.env.outputs.tfvars }}" \
            -no-color \
            -out=tfplan.binary \
          2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;
            const output = `## Terraform Plan — \`${{ steps.env.outputs.env }}\`
            
            <details>
            <summary>Show Plan</summary>
            
            \`\`\`hcl
            ${truncated}
            \`\`\`
            
            </details>
            
            > Plan generated by @${{ github.actor }} on \`${{ github.event.pull_request.head.sha }}\``;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
