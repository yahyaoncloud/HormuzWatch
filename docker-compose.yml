services:
  go-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: harmuz-server
    ports:
      - "8081:10000"
    environment:
      - PORT=10000
      - AUTH_DISABLED=false
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ML_SERVICE_URL=http://ml-service:8090
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    depends_on:
      ml-service:
        condition: service_healthy
    networks:
      - harmuz-network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: harmuz-ml
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
    networks:
      - harmuz-network

networks:
  harmuz-network:
    driver: bridge
