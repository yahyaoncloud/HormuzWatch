server {
    listen 3000;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Proxy to Go backend server
        proxy_pass http://go-server:8080/;
        proxy_http_version 1.1;

        # WebSocket upgrade headers — CRITICAL for persistent connections
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket keepalive timeouts — prevents NGINX from killing idle connections
        # Must be longer than the server-side ping interval (54s) + buffer
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time WebSocket/SSE traffic
        proxy_buffering off;
    }
}
