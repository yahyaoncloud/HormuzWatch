---
# Master deploy playbook — applies all roles in order
- name: Deploy HormuzWatch to AVM
  hosts: avm
  become: true

  pre_tasks:
    - name: Gather facts
      ansible.builtin.gather_facts:

    - name: Print deployment info
      ansible.builtin.debug:
        msg: "Deploying to {{ inventory_hostname }} | env={{ env }}"

  roles:
    - role: common
      tags: [common, security]
    - role: docker
      tags: [docker]
    - role: secrets
      tags: [secrets]
    - role: ml-service
      tags: [ml]

  post_tasks:
    - name: Verify backend health
      ansible.builtin.uri:
        url: "http://localhost:{{ backend_port }}/health"
        status_code: 200
        timeout: 30
      register: health_check
      retries: 5
      delay: 10
      until: health_check.status == 200
      tags: [verify]

    - name: Verify ML service health
      ansible.builtin.uri:
        url: "http://localhost:{{ ml_port }}/health"
        status_code: 200
        timeout: 30
      register: ml_health
      retries: 3
      delay: 10
      until: ml_health.status == 200
      tags: [verify]

    - name: Deployment complete
      ansible.builtin.debug:
        msg: "✅ HormuzWatch deployed successfully on {{ inventory_hostname }}"
