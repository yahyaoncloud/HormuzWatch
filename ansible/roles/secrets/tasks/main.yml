---
# Fetch secrets from Azure Key Vault and write .env to AVM

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ config_dir }}"
    state: directory
    mode: '0700'
    owner: root
    group: root

- name: Fetch DATABASE_URL from Key Vault
  ansible.builtin.command:
    cmd: "az keyvault secret show --vault-name {{ kv_name }} --name database-url --query value -o tsv"
  register: db_url_result
  changed_when: false
  no_log: true

- name: Fetch REDIS connection string from Key Vault
  ansible.builtin.command:
    cmd: "az keyvault secret show --vault-name {{ kv_name }} --name redis-connection-string --query value -o tsv"
  register: redis_url_result
  changed_when: false
  no_log: true

- name: Fetch AISStream API key from Key Vault
  ansible.builtin.command:
    cmd: "az keyvault secret show --vault-name {{ kv_name }} --name aisstream-api-key --query value -o tsv"
  register: aisstream_key_result
  changed_when: false
  no_log: true
  ignore_errors: true

- name: Write .env file
  ansible.builtin.copy:
    dest: "{{ config_dir }}/.env"
    mode: '0600'
    owner: root
    group: root
    content: |
      # Generated by Ansible — DO NOT EDIT MANUALLY
      # Environment: {{ env }}
      DATABASE_URL={{ db_url_result.stdout }}
      REDIS_URL={{ redis_url_result.stdout }}
      AISSTREAM_API_KEY={{ aisstream_key_result.stdout | default('') }}
      PORT=8080
      GIN_MODE=release
      AUTH_DISABLED=false
  no_log: true

- name: Verify .env written
  ansible.builtin.stat:
    path: "{{ config_dir }}/.env"
  register: env_file_stat

- name: Assert .env exists
  ansible.builtin.assert:
    that: env_file_stat.stat.exists
    fail_msg: ".env file was not created successfully"
