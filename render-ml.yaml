services:
  # Python ML Inference (Web Service)
  - type: web
    name: hormuzwatch-ml
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    rootDir: ml-inference
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
