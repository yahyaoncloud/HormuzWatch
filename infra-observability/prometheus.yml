global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: hormuzwatch
    env: dev

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # ── Go Backend ────────────────────────────────────────────────────────
  - job_name: hormuzwatch-backend
    static_configs:
      - targets: ["backend:8080"]
    metrics_path: /metrics
    scheme: http

  # ── ML Service ────────────────────────────────────────────────────────
  - job_name: hormuzwatch-ml
    static_configs:
      - targets: ["ml-service:8090"]
    metrics_path: /metrics
    scheme: http

  # ── Redis Exporter ────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # ── PostgreSQL Exporter ───────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # ── Node / OS Metrics ─────────────────────────────────────────────────
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── Prometheus self-scrape ────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
